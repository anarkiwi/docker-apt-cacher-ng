version: 2
updates:
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    ignore:
      # Pin the base image to Ubuntu 24.04 LTS; the tag itself receives
      # upstream security rebuilds, so no tag bump is wanted.
      - dependency-name: ubuntu
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
